services:
  - type: web
    name: veloza-motors
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: DB_URI
        sync: false
      - key: FRANKFURTER_API_URL
        value: https://api.frankfurter.app
